<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了｜メディフットケア</title>
  <meta name="description" content="お申し込み・お問い合わせを受け付けました。スタッフより折り返しご連絡いたします。">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .thank-you-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .thank-you-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem;
    }
    .thank-you-card {
      background: white;
      border-radius: 1.5rem;
      padding: 3rem 2rem;
      text-align: center;
      box-shadow: var(--shadow-lg);
      max-width: 480px;
      width: 100%;
    }
    .thank-you-icon {
      width: 80px;
      height: 80px;
      background: var(--color-primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }
    .thank-you-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-primary-dark);
      margin-bottom: 1rem;
    }
    .thank-you-text {
      color: var(--color-text-light);
      line-height: 1.9;
      margin-bottom: 1.5rem;
    }
    .redirect-notice {
      font-size: 0.8125rem;
      color: var(--color-text-light);
      margin-top: 1.5rem;
    }
    .countdown {
      font-weight: 700;
      color: var(--color-primary-dark);
    }
  </style>
</head>
<body class="thank-you-page">

<header class="header" id="header">
  <div class="container">
    <div class="header__inner">
      <a href="../index.html" class="header__logo">
        <img src="../images/logo.png" alt="メディフットケア" class="header__logo-img">
      </a>
    </div>
  </div>
</header>

<main class="thank-you-main">
  <div class="thank-you-card">
    <div class="thank-you-icon">✅</div>
    <h1 class="thank-you-title">送信が完了しました</h1>
    <p class="thank-you-text">
      お申し込み・お問い合わせいただきありがとうございます。<br>
      内容を確認の上、<strong>1〜2営業日以内</strong>にスタッフよりご連絡いたします。
    </p>
    <div style="background:var(--color-primary-light); border-radius:1rem; padding:1rem; margin-bottom:1.5rem;">
      <p style="font-size:0.875rem; color:var(--color-primary-dark);">
        メールが届かない場合は、迷惑メールフォルダをご確認いただくか、お問い合わせフォームより再度ご連絡ください。
      </p>
    </div>
    <a href="../index.html" class="btn btn--accent btn--full">トップページへ戻る</a>
    <p class="redirect-notice">
      <span class="countdown" id="countdown">5</span>秒後に自動的にトップページへ移動します
    </p>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom">
      <p class="footer__copyright">&copy; 2025 メディフットケア All Rights Reserved.</p>
      <div class="footer__bottom-links">
        <a href="privacy.html" class="footer__bottom-link">プライバシーポリシー</a>
        <a href="contact.html" class="footer__bottom-link">お問い合わせ</a>
      </div>
    </div>
  </div>
</footer>

<script>
  // カウントダウンとリダイレクト
  (function() {
    var count = 5;
    var el = document.getElementById('countdown');
    var timer = setInterval(function() {
      count--;
      if (el) el.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = '../index.html';
      }
    }, 1000);
  })();
</script>
</body>
</html>
